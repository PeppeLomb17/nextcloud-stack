services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    volumes:
      - /mnt/ssd/nextcloud-data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  redis:
    image: redis:7
    restart: unless-stopped

  nextcloud:
    image: nextcloud:apache
    restart: unless-stopped
